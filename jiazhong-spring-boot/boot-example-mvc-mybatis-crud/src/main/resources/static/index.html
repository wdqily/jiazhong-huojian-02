<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
</head>
<body>
<div id="app">
    <el-table
            :data="emps"
            style="width: 100%">
        <el-table-column label="编号" prop="empNo"></el-table-column>
        <el-table-column label="姓名" prop="ename"></el-table-column>
        <el-table-column label="职位" prop="job"></el-table-column>
        <el-table-column label="上司ID" prop="mgr"></el-table-column>
        <el-table-column label="入职时间" prop="hireDate"></el-table-column>
        <el-table-column label="工资" prop="sal"></el-table-column>
        <el-table-column label="奖金" prop="comm"></el-table-column>
        <el-table-column label="部门ID" prop="deptNo"></el-table-column>
        <el-table-column align="right">
            <template slot="header" slot-scope="scope">
                <el-input
                        v-model="searchKeyword"
                        size="medium"
                        placeholder="搜索员工姓名、职位..."
                        prefix-icon="el-icon-search"
                        class="search-input"
                        @keyup.enter.native="handleSearch(1)">
                </el-input>
            </template>
            <template slot-scope="scope">
                <el-button type="danger" icon="el-icon-delete-solid" circle
                           @click="handleDelete(scope.row)">

                </el-button>
            </template>
        </el-table-column>
    </el-table>
    <el-pagination
            background
            style="text-align: center"
            layout="prev, pager, next"
            :current-page.sync="page"
            @current-change="handleSearch"
            :total="all_count">
    </el-pagination>
</div>

<script src="js/vue.min.js"></script>
<script src="js/axios.min.js"></script>
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<script>
    new Vue({
        el: '#app',
        data() {
            return {
                emps: [],
                all_count: 0,
                searchKeyword: '',
                page: 1,
            }
        },
        methods: {
            loadEmpData(page) {
                axios({
                    url: '/emp/page?page=' + page
                }).then(resp => {
                    this.emps = resp.data.list
                    this.all_count = resp.data.total
                })
            },
            handleSearch(page) {
                this.page = page
                axios({
                    url: '/emp/search?page=' + page + '&ename=' + this.searchKeyword
                }).then(resp => {
                    this.emps = resp.data.list;
                    this.all_count = resp.data.total
                })
            },
            handleDelete(row) {
                this.$confirm('确认删除该员工吗？', '提示', {
                    confirmButtonText: '确定',
                    cancelButtonText: '取消',
                    type: 'warning'
                }).then(() => {
                    axios({
                        url: '/emp/delete?id=' + row.empNo
                    }).then(resp => {
                        //重新刷新页面
                        // this.loadEmpData(1)
                        this.handleSearch(1)
                    });
                }).catch(() => {
                    this.$message({
                        type: 'info',
                        message: '已取消删除'
                    });
                });
            }
        },
        created() {
            this.loadEmpData(1)
        }
    })
</script>
</body>
</html>

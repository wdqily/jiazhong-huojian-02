<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <!-- 引入样式 -->
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
</head>
<body>
<div id="app">
    <el-table
            :data="emps"
            style="width: 100%">
        <el-table-column
                label="编号"
                prop="empNo">
        </el-table-column>
        <el-table-column
                label="姓名"
                prop="ename">
        </el-table-column>
        <el-table-column
                label="职位"
                prop="job">
        </el-table-column>
        <el-table-column
                label="上司ID"
                prop="mgr">
        </el-table-column>
        <el-table-column
                label="入职时间"
                prop="hireDate">
        </el-table-column>
        <el-table-column
                label="工资"
                prop="sal">
        </el-table-column>
        <el-table-column
                label="奖金"
                prop="comm">
        </el-table-column>
        <el-table-column
                label="部门ID"
                prop="deptNo">
        </el-table-column>
        <el-table-column
                align="right">
            <template slot="header" slot-scope="scope">
                <el-input
                        size="mini"
                        placeholder="输入关键字搜索"/>
            </template>
            <template slot-scope="scope">
                <el-button type="danger" icon="el-icon-delete-solid" circle></el-button>
            </template>
        </el-table-column>
    </el-table>
    <el-pagination
            background
            style="text-align: center"
            layout="prev, pager, next"
            @current-change="loadEmpData"
            :total="all_count">
    </el-pagination>
</div>

</body>
</html>
<script src="js/vue.min.js"></script>
<script src="js/axios.min.js"></script>
<!-- 引入组件库 -->
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<script>
    new Vue({
        el: '#app',
        data() {
            return {
                emps: [],
                all_count: 0
            }
        },
        methods: {
            loadEmpData(page) {
                // 1. 调用controller,会返回一个数据
                axios({
                    url: '/emp/page?page=' + page
                }).then(resp => {
                    //list是分页标签返回的数据
                    this.emps = resp.data.list
                    this.all_count = resp.data.total
                })
                // 2. 将这个集合遍历
            }
        },
        created() {
            this.loadEmpData(1)
        }
    })
</script>
